[[channels]]
name = "radar_a"
enabled = true

[channels.serial]
port = "/dev/ttyUSB0"
passthrough_port = "/dev/ttyUSB10"
baud_rate = 921600
data_bits = 8
stop_bits = 1
parity = "none"
flow_control = "none"
read_timeout_ms = 100

[channels.packet]
packet_len = 8
header = "AA55"
tail = "55AA"

[[channels]]
name = "radar_b"
enabled = true

[channels.serial]
port = "/dev/ttyUSB1"
baud_rate = 921600
data_bits = 8
stop_bits = 1
parity = "none"
flow_control = "none"
read_timeout_ms = 100

[channels.packet]
packet_len = 10
header = "AABB"
tail = "BBAA"
